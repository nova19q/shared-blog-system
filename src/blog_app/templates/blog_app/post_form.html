{% extends "blog_app/base.html" %}

{% block title %}New post | Shared Blog System{% endblock %}

{% block content %}
  <section class="form-shell">
    <div>
      <p class="dateline">Editorial desk</p>
      <h1>Submit a new story</h1>
    </div>
    <form method="post" class="stacked-form">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="button" type="submit">Publish story</button>
    </form>
  </section>
{% endblock %}
